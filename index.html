<!DOCTYPE html>
<html lang="EN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, initial-scale=1.0">
    <title>Restaurant Japonais</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>

    <header class="hero">

        <!-- Menu -->
        <span class="material-symbols-outlined menu-icon">
            menu
        </span>


        <!-- Vidéo -->
        <video autoplay muted loop playsinline class="hero-video">
            <source src="assets/video/video_test.mov" type="video/mp4">
        </video>

    </header>


    <section class="specialites">

        <h2>Nos spécialités</h2>

        <div class="cards">

            <div class="card">
                <p>Sushis et<br>makis</p>
                <div class="ligne"></div>
                <img src="https://files.svgcdn.io/game-icons/sushis.svg" alt="Sushi" class="icon-sushi">
            </div>

            <div class="card">
                <p>Grillades</p>
                <div class="ligne"></div>
                <img src="https://files.svgcdn.io/streamline-ultimate/barbecue-grill-bold.svg" alt="Grill"
                    class="icon-grill">
            </div>

            <div class="card">
                <p>Cave à vin</p>
                <div class="ligne"></div>
                <img src="https://files.svgcdn.io/whh/wine.svg" alt="Vin" class="icon-vin">
            </div>

        </div>

        <button class="btn-menu">VOIR LE MENU</button>

    </section>

    <footer class="footer">

        <div class="footer-contenu">

            <div class="footer-image">
                <img src="assets/images/avif/image_prototype.avif" alt="Restaurant">
            </div>

            <div class="footer-ligne"></div>

            <div class="footer-heures">
                <h3>Heure d'ouverture</h3>

                <p><strong>Lun – Jeu :</strong> 17h – 22h</p>
                <p><strong>Ven – Sam :</strong> 17h – 23h</p>
                <p><strong>Dim :</strong> Fermé</p>
            </div>

            <div class="footer-ligne"></div>

            <div class="footer-newsletter">

                <h3>Infolettre</h3>

                <div class="newsletter-form">
                    <input type="email" placeholder="Adresse courriel">
                    <button>OK</button>
                </div>

            </div>

            <div class="footer-bas">

                <p>© 2026 Hizakaya Hiroshi • Tous droits réservés</p>

                <p class="footer-liens">
                    Menu • Réservations • Politique de confidentialité
                </p>

            </div>

        </div>

    </footer>
</body>

</html>
