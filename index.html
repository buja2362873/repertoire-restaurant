<!DOCTYPE html>
<html lang="EN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, initial-scale=1.0">
    <title>Restaurant Japonais</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>

    <header class="hero">

        <!-- Menu -->
            <span class="material-symbols-outlined menu-icon">
                menu
            </span>


        <!-- Vidéo -->
        <video autoplay muted loop playsinline class="hero-video">
            <source src="assets/video/video_test.mov" type="video/mp4">
        </video>

    </header>


    <section class="specialites">

        <h2>Nos spécialités</h2>

        <div class="cards">

            <div class="card">
                <p>Sushis et<br>makis</p>
                <div class="ligne"></div>
                <img src="https://files.svgcdn.io/game-icons/sushis.svg" alt="Sushi" class="icon-sushi">
            </div>

            <div class="card">
                <p>Grillades</p>
                <div class="ligne"></div>
                <img src="https://files.svgcdn.io/streamline-ultimate/barbecue-grill-bold.svg" alt="Grill"
                    class="icon-grill">
            </div>

            <div class="card">
                <p>Cave à vin</p>
                <div class="ligne"></div>
                <img src="https://files.svgcdn.io/whh/wine.svg" alt="Vin" class="icon-vin">
            </div>

        </div>

        <button class="btn-menu">VOIR LE MENU</button>

    </section>

</body>

</html>
